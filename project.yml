name: ProxifierSwitch
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
targets:
  ProxifierSwitch:
    type: application
    platform: macOS
    sources:
      - path: ProxifierSwitch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.ProxifierSwitch
        PRODUCT_MODULE_NAME: ProxifierSwitch
        PRODUCT_NAME: Proxifier Switch
        INFOPLIST_FILE: ProxifierSwitch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
    info:
      path: ProxifierSwitch/Info.plist
      properties:
        CFBundleDisplayName: Proxifier Switch
        LSUIElement: true
schemes:
  ProxifierSwitch:
    build:
      targets:
        ProxifierSwitch: all
    run:
      config: Debug
